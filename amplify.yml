version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22 || nvm install 22
        - node -v
        - npm -v
        - env | grep -E '^(NEXT_PUBLIC_|PROJECTS_TABLE_NAME|CATEGORIES_TABLE_NAME|SITE_CONTENT_TABLE_NAME|CONTACT_REQUESTS_TABLE_NAME|SITE_SETTINGS_TABLE_NAME|AUDIT_LOGS_TABLE_NAME|UPLOADS_BUCKET_NAME|CLOUDFRONT_DOMAIN|NID_AWS_ACCESS_KEY_ID|NID_AWS_SECRET_ACCESS_KEY|NID_AWS_SESSION_TOKEN)=' > .env.production
        - npm ci
    build:
      commands:
        - npm run typecheck
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
